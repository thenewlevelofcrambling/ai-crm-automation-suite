<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оставить заявку — AI CRM</title>
  <style>
    :root { --bg:#0f1115; --card:#171a21; --line:#262b36; --ink:#e8eaed; --muted:#9aa3b2; --accent:#6c8cff; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center;
           font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--ink); }
    .card { width:min(440px, 92vw); background:var(--card); border:1px solid var(--line);
            border-radius:16px; padding:28px; }
    h1 { margin:0 0 4px; font-size:20px; }
    p.sub { margin:0 0 20px; color:var(--muted); font-size:14px; }
    label { display:block; font-size:13px; color:var(--muted); margin:14px 0 6px; }
    input, textarea { width:100%; padding:11px 13px; background:#0f1218; color:var(--ink);
                      border:1px solid var(--line); border-radius:10px; font-size:14px; outline:none; }
    input:focus, textarea:focus { border-color:var(--accent); }
    textarea { resize:vertical; min-height:90px; }
    button { width:100%; margin-top:20px; padding:12px; background:var(--accent); color:#fff;
             border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.6; cursor:default; }
    .msg { margin-top:14px; font-size:14px; min-height:20px; }
    .ok { color:#4ade80; } .err { color:#f87171; }
  </style>
</head>
<body>
  <form class="card" id="leadForm">
    <h1>Оставить заявку</h1>
    <p class="sub">Ответим в ближайшее время</p>

    <label for="name">Имя</label>
    <input id="name" name="name" required />

    <label for="email">Email</label>
    <input id="email" name="email" type="email" required />

    <label for="phone">Телефон</label>
    <input id="phone" name="phone" required placeholder="+7 ..." />

    <label for="message">Сообщение</label>
    <textarea id="message" name="message" required placeholder="Опишите, что вам нужно"></textarea>

    <button type="submit" id="submitBtn">Отправить</button>
    <div class="msg" id="msg"></div>
  </form>

  <script>
    // ⚠️ ЗАМЕНИ на свой секрет из Webhook-ноды (Header Auth → x-webhook-secret)
    const WEBHOOK_SECRET = "YOUR_WEBHOOK_SECRET"; // вставь свой секрет локально; в репозиторий не коммить
    const WEBHOOK_URL = "http://localhost:5678/webhook/lead";

    const form = document.getElementById("leadForm");
    const msg = document.getElementById("msg");
    const btn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      btn.disabled = true; msg.className = "msg"; msg.textContent = "Отправляем…";

      const payload = {
        name: form.name.value,
        email: form.email.value,
        phone: form.phone.value,
        message: form.message.value,
      };

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-webhook-secret": WEBHOOK_SECRET, // тот самый секрет, что проверяет n8n
          },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        msg.className = "msg ok";
        msg.textContent = "✅ Заявка отправлена! Менеджер скоро свяжется.";
        form.reset();
      } catch (err) {
        msg.className = "msg err";
        msg.textContent = "❌ Ошибка отправки: " + err.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
